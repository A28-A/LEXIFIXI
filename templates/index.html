<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiFix | Pastel AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfcf0; --card: #ffffff;
            --blue: #abc4ff; --mint: #c7ddcc;
            --peach: #ffafcc; --text: #465a7a;
        }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 50px 20px; color: var(--text); }
        .container { background: var(--card); width: 100%; max-width: 600px; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(171, 196, 255, 0.2); }
        h1 { text-align: center; margin-bottom: 30px; }
        textarea { width: 100%; height: 160px; padding: 20px; border: 2px solid #edf2fb; border-radius: 20px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; resize: none; }
        textarea:focus { border-color: var(--blue); }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-size: 16px; font-weight: 700; transition: 0.3s; }
        .btn-fix { background: var(--blue); color: white; }
        .btn-fix:hover { background: #9bb7f0; transform: translateY(-2px); }
        .btn-clear { background: #f1f3f5; color: #8899a6; }
        #loader { display: none; text-align: center; margin: 20px auto; font-weight: bold; color: var(--peach); }
        .result-box { margin-top: 30px; padding: 25px; background: #f0fff4; border-left: 6px solid var(--mint); border-radius: 20px; position: relative; }
        .copy-btn { position: absolute; top: 15px; right: 15px; background: white; border: 1px solid var(--mint); padding: 5px 12px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ LexiFix AI</h1>
    <form id="grammarForm" method="POST">
        <textarea name="text_input" id="textInput" placeholder="Paste your text here...">{{ original }}</textarea>
        <div class="btn-group">
            <button type="button" class="btn-clear" onclick="clearText()">Clear</button>
            <button type="submit" class="btn-fix" id="submitBtn">Fix Errors</button>
        </div>
    </form>
    <div id="loader">✨ Polishing your text...</div>
    {% if corrected %}
    <div class="result-box" id="resultArea">
        <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy</button>
        <strong>Corrected Version:</strong>
        <p id="correctedText" style="margin-top: 10px; font-size: 18px;">{{ corrected }}</p>
    </div>
    {% endif %}
</div>
<script>
    document.getElementById('grammarForm').onsubmit = function() {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = 'Thinking...';
    };
    function clearText() {
        document.getElementById('textInput').value = '';
        if(document.getElementById('resultArea')) document.getElementById('resultArea').style.display = 'none';
    }
    async function copyText() {
        const text = document.getElementById('correctedText').innerText;
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('copyBtn');
        btn.innerText = '✓ Copied';
        setTimeout(() => btn.innerText = 'Copy', 2000);
    }
</script>
</body>
</html>
